<div class=page id=page-settings>
          <div class=settings-wrap>
            <div class=settings-head style=display:flex;align-items:flex-end;gap:12px>
              <div style=flex:1>
                <div class=settings-head-t style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--ink3);font-weight:400">Settings</div>
              </div>
            </div>
            <div class=settings-section><span class=settings-sec-lbl>Appearance</span>
              <div class=settings-card style=padding:12px;display:flex;flex-direction:column;gap:12px>
                <div style=display:flex;justify-content:space-between;align-items:center>
                  <div>
                    <div class=setting-name style=font-size:13px>Theme</div>
                    <div class=setting-desc style=font-size:11px;color:var(--ink3)>Light / Dark</div>
                  </div>
                  <div style=display:flex;align-items:center;gap:10px><span style="font-family:DM Mono,monospace;font-size:11px;color:var(--ink3)">Light</span> <label class=toggle
                      title="Toggle light / dark"><input id=theme-toggle type=checkbox onchange=toggleTheme(this.checked) checked> <span class=toggle-track></span></label>                    <span style="font-family:DM Mono,monospace;font-size:11px;color:var(--ink3)">Dark</span></div>
                </div>
              </div>
            </div>
            <div class=settings-section><span class=settings-sec-lbl>Custom Background</span>
              <div class=settings-card style=padding:14px;display:flex;flex-direction:column;gap:14px>
                <div style="display:none;position:relative;width:100%;height:80px;border:1px solid var(--border2);overflow:hidden;border-radius:2px"
                  id=custom-bg-preview-wrap>
                  <div style=width:100%;height:100%;background-size:cover;background-position:center id=custom-bg-preview></div>
                  <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.45),transparent);display:flex;align-items:center;padding:10px 12px"><span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7)">Active Custom Background</span></div>
                </div>
                <div style=display:flex;flex-direction:column;gap:6px>
                  <div style=display:flex;gap:12px;align-items:flex-end>
                    <div style=flex:1>
                      <div class=setting-name style=font-size:12px>Imgur URL</div>
                      <div class=setting-desc style=font-size:11px;color:var(--ink3);margin-bottom:4px>Paste a direct image link (e.g. https://i.imgur.com/abc123.jpg)</div>
                      <div style=display:flex;gap:8px;align-items:center><input id=custom-bg-input placeholder=https://i.imgur.com/... style="flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--ink);font-family:'DM Mono',monospace;font-size:11px;padding:7px 10px;outline:0;transition:border-color .2s"
                          onblur='this.style.borderColor="var(--border2)"' onfocus='this.style.borderColor="var(--pk)"' onkeydown='"Enter"===event.key&&setCustomBg()'
                          type=url> <button onclick=setCustomBg() class=setting-btn style=white-space:nowrap>Set Background</button></div>
                    </div>
                    <div style=width:170px>
                      <div class=setting-name style=font-size:12px>Mode</div>
                      <div class=setting-desc style=font-size:11px;color:var(--ink3);margin-bottom:4px>How the image fills the page</div><select id=custom-bg-mode style="width:100%;padding:8px;background:var(--s2);border:1px solid var(--border2);color:var(--ink);font-family:'DM Mono',monospace;font-size:11px;border-radius:2px"><option value=tile>Tile (repeat)<option value=cover>Fill (cover)</select></div>
                  </div>
                </div>
                <div style="display:none;border-top:1px solid var(--border);padding-top:12px;justify-content:space-between;align-items:center"
                  id=custom-bg-remove-row>
                  <div>
                    <div class=setting-name style=font-size:12px>Remove Custom Background</div>
                    <div class=setting-desc style=font-size:11px;color:var(--ink3)>Reverts to the default stone / concrete texture</div>
                  </div>
                  <div style=display:flex;gap:8px;align-items:center><button onclick=removeCustomBg() class=setting-btn title="Remove background">Remove</button> <button onclick=toggleCustomBgPreview()
                      class=setting-btn title="Toggle preview repeat/fill" id=custom-bg-preview-toggle>Preview Mode</button></div>
                </div>
              </div>
            </div>
          </div>
        </div>
