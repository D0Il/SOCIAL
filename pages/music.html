<div class=page id=page-music style=overflow:auto>
          <style>
            .mp {
              background: 0 0;
              min-height: calc(100vh - 80px)
            }

            .mp-sidebar {
              border-right: 1px solid var(--border2);
              display: flex;
              flex-direction: column;
              position: sticky;
              top: 0;
              height: calc(100vh - 80px);
              overflow-y: auto;
              scrollbar-width: none;
              background: rgba(20, 18, 16, .55);
              backdrop-filter: blur(18px);
              -webkit-backdrop-filter: blur(18px)
            }

            html.light-mode .mp-sidebar {
              background: rgba(255, 255, 255, .55)
            }

            .mp-sidebar::-webkit-scrollbar {
              display: none
            }

            .mp-sidebar-identity {
              padding: 32px 20px 24px;
              border-bottom: 1px solid var(--border);
              display: flex;
              flex-direction: column;
              align-items: center;
              text-align: center;
              gap: 0
            }

            .mp-av-ring {
              width: 90px;
              height: 90px;
              overflow: hidden;
              border-radius: 50%;
              margin-bottom: 16px;
              flex-shrink: 0
            }

            .mp-av-ring img {
              width: 100%;
              height: 100%;
              object-fit: cover
            }

            .mp-sidebar-name {
              font-family: 'Big Shoulders Display', sans-serif;
              font-size: 32px;
              font-weight: 900;
              letter-spacing: 3px;
              text-transform: uppercase;
              color: var(--ink);
              line-height: 1;
              margin-bottom: 6px
            }

            .mp-sidebar-sub {
              display: none
            }

            .mp-sidebar-bio {
              display: none
            }

            .mp-sidebar-streams {
              padding: 0;
              display: flex;
              flex-direction: column;
              flex: 1
            }

            .mp-sidebar-stream-head {
              display: none
            }

            .mp-sidebar-stream-link {
              display: flex;
              align-items: center;
              gap: 10px;
              padding: 12px 16px;
              text-decoration: none;
              border-bottom: 1px solid var(--border);
              transition: background .1s;
              position: relative
            }

            .mp-sidebar-stream-link::before {
              content: '';
              position: absolute;
              left: 0;
              top: 0;
              bottom: 0;
              width: 0;
              background: var(--ink);
              transition: width .15s
            }

            .mp-sidebar-stream-link:hover::before {
              width: 3px
            }

            .mp-sidebar-stream-link:hover {
              background: var(--s1)
            }

            .mp-sidebar-stream-link .mp-stream-icon-wrap {
              width: 20px;
              height: 20px;
              flex-shrink: 0;
              position: relative;
              overflow: visible
            }

            .mp-sidebar-stream-name {
              font-family: 'DM Mono', monospace;
              font-size: 9px;
              letter-spacing: 1.5px;
              text-transform: uppercase;
              color: var(--ink);
              flex: 1
            }

            .mp-sidebar-stream-arrow {
              font-family: 'DM Mono', monospace;
              font-size: 9px;
              color: var(--ink3);
              transition: transform .15s, color .15s
            }

            .mp-sidebar-stream-link:hover .mp-sidebar-stream-arrow {
              transform: translateX(4px);
              color: var(--ink)
            }

            .mp-eras-section {
              padding: 0
            }

            .mp-eras-header {
              padding: 40px 36px 24px;
              display: flex;
              align-items: flex-end;
              justify-content: center;
              border-bottom: 1px solid var(--border2);
              margin-bottom: 0;
              position: relative;
              top: 0;
              z-index: 2;
              background: rgba(20, 18, 16, .55);
              backdrop-filter: blur(18px);
              -webkit-backdrop-filter: blur(18px)
            }

            html.light-mode .mp-eras-header {
              background: rgba(255, 255, 255, .55)
            }

            .mp-eras-headline {
              font-family: Mostwasted, cursive;
              font-size: clamp(32px, 4vw, 52px);
              color: var(--ink);
              line-height: 1;
              letter-spacing: 1px
            }

            /* position admin add button to the right while keeping headline centered */

            .mp-eras-header .mp-admin-add {
              position: absolute;
              right: 20px;
              top: 50%;
              transform: translateY(-50%);
              z-index: 3
            }

            .mp-admin-add {
              display: none;
              background: 0 0;
              border: 1px solid var(--border2);
              font-family: 'DM Mono', monospace;
              font-size: 7px;
              letter-spacing: 2px;
              text-transform: uppercase;
              color: var(--ink3);
              padding: 5px 12px;
              cursor: pointer;
              transition: all .15s;
              flex-shrink: 0
            }

            body.talk-admin .mp-admin-add {
              display: block
            }

            .mp-admin-add:hover {
              border-color: var(--ink);
              color: var(--ink)
            }

            .mp-eras-grid {
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
              gap: 2px;
              background: 0 0
            }

            .mp-era-card-wrapper {
              background: 0 0
            }

            .mp-era-card-outer {
              display: flex;
              flex-direction: column;
              background: 0 0;
              cursor: pointer
            }

            .mp-era-card-outer:hover .mp-era-card img {
              transform: scale(1.08);
              filter: grayscale(0%)
            }

            .mp-era-card {
              background: 0 0;
              position: relative;
              overflow: hidden;
              aspect-ratio: 1;
              width: 100%
            }

            .mp-era-card img {
              position: absolute;
              inset: 0;
              width: 100%;
              height: 100%;
              object-fit: cover;
              transition: transform .8s cubic-bezier(.16, 1, .3, 1);
              filter: grayscale(20%)
            }

            .mp-era-card-placeholder {
              position: absolute;
              inset: 0;
              background: repeating-linear-gradient(-45deg, var(--s1) 0, var(--s1) 8px, var(--s2) 8px, var(--s2) 16px);
              display: flex;
              align-items: center;
              justify-content: center;
              font-family: 'Bebas Neue', sans-serif;
              font-size: 11px;
              letter-spacing: 4px;
              color: var(--ink3)
            }

            .mp-era-card-foot {
              position: relative;
              z-index: 1;
              padding: 0;
              background: 0 0
            }

            .mp-era-card-foot-inner {
              display: none
            }

            .mp-era-card-tag {
              display: none
            }

            .mp-era-card-title {
              display: none
            }

            .mp-era-card-date {
              display: none
            }

            .mp-era-card-label {
              padding: 10px 4px 4px
            }

            .mp-era-card-label-title {
              font-family: 'Cormorant Garamond', serif;
              font-weight: 300;
              font-size: 15px;
              letter-spacing: 4px;
              text-transform: uppercase;
              color: var(--ink);
              line-height: 1
            }

            .mp-era-card-label-tag {
              font-family: 'DM Mono', monospace;
              font-size: 6px;
              letter-spacing: 3px;
              text-transform: uppercase;
              color: var(--ink3);
              margin-top: 4px
            }

            .mp-era-card-date {
              font-family: 'DM Mono', monospace;
              font-size: 7px;
              letter-spacing: 1px;
              color: rgba(237, 232, 222, .3);
              margin-top: 5px
            }

            .mp-era-badge {
              position: absolute;
              top: 0;
              left: 0;
              z-index: 2;
              font-family: 'DM Mono', monospace;
              font-size: 6px;
              letter-spacing: 3px;
              text-transform: uppercase;
              padding: 5px 12px
            }

            .mp-era-badge.live {
              display: none
            }

            .mp-era-badge.upcoming {
              background: var(--ink);
              color: var(--bg)
            }

            .mp-era-badge.era {
              background: rgba(0, 0, 0, .6);
              color: rgba(237, 232, 222, .4)
            }

            .era-modal-bg {
              display: none;
              position: fixed;
              inset: 0;
              background: rgba(0, 0, 0, .96);
              z-index: 600;
              align-items: center;
              justify-content: center
            }

            .era-modal-bg.open {
              display: flex
            }

            .era-modal {
              background: var(--bg);
              border: 1px solid rgba(237, 232, 222, .08);
              width: min(92vw, 820px);
              max-height: 90vh;
              display: grid;
              grid-template-columns: 1fr 1fr;
              overflow: hidden;
              position: relative
            }

            .era-modal-photo {
              background: var(--s1);
              overflow: hidden;
              display: flex;
              align-items: center;
              justify-content: center;
              min-height: 380px;
              position: relative
            }

            .era-modal-photo img {
              width: 100%;
              height: 100%;
              object-fit: cover;
              filter: grayscale(15%)
            }

            .era-modal-photo:hover img {
              filter: grayscale(0%)
            }

            .era-modal-photo-empty {
              font-family: 'Bebas Neue', sans-serif;
              font-size: 11px;
              letter-spacing: 4px;
              color: var(--ink3)
            }

            .era-modal-photo-upload {
              position: absolute;
              bottom: 0;
              left: 0;
              right: 0;
              display: none;
              background: rgba(0, 0, 0, .8)
            }

            body.talk-admin .era-modal-photo-upload {
              display: block
            }

            .era-modal-photo-upload label {
              font-family: 'DM Mono', monospace;
              font-size: 6px;
              letter-spacing: 2px;
              text-transform: uppercase;
              padding: 8px 16px;
              display: block;
              color: rgba(237, 232, 222, .5);
              cursor: pointer;
              text-align: center
            }

            .era-modal-side {
              padding: 36px 32px;
              overflow-y: auto;
              border-left: 1px solid rgba(237, 232, 222, .06);
              display: flex;
              flex-direction: column
            }

            .era-modal-close {
              position: absolute;
              top: 16px;
              right: 16px;
              z-index: 2;
              background: 0 0;
              border: none;
              color: rgba(237, 232, 222, .25);
              font-size: 16px;
              cursor: pointer;
              font-family: 'DM Mono', monospace;
              letter-spacing: 1px;
              transition: color .15s
            }

            .era-modal-close:hover {
              color: rgba(237, 232, 222, .8)
            }

            .era-modal-tag {
              font-family: 'DM Mono', monospace;
              font-size: 6px;
              letter-spacing: 5px;
              text-transform: uppercase;
              color: rgba(237, 232, 222, .3);
              margin-bottom: 12px
            }

            .era-modal-name {
              font-family: 'Bebas Neue', sans-serif;
              font-size: clamp(32px, 5vw, 52px);
              letter-spacing: 4px;
              color: var(--ink);
              line-height: .9;
              border-bottom: 1px solid var(--border);
              padding-bottom: 18px;
              margin-bottom: 18px
            }

            .era-modal-desc {
              font-family: 'Cormorant Garamond', serif;
              font-style: italic;
              font-size: 14px;
              line-height: 1.9;
              color: var(--ink3);
              flex: 1;
              white-space: pre-line
            }

            .era-modal-links {
              margin-top: 20px;
              display: flex;
              flex-direction: column;
              gap: 1px
            }

            .era-modal-link {
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 11px 14px;
              font-family: 'DM Mono', monospace;
              font-size: 8px;
              letter-spacing: 2px;
              text-transform: uppercase;
              color: var(--ink3);
              text-decoration: none;
              transition: all .15s;
              border-bottom: 1px solid var(--border)
            }

            .era-modal-link:hover {
              color: var(--ink);
              padding-left: 20px
            }

            .era-modal-edit {
              display: none;
              margin-top: 18px;
              gap: 6px;
              flex-wrap: wrap
            }

            body.talk-admin .era-modal-edit {
              display: flex
            }

            .era-modal-edit button {
              font-family: 'DM Mono', monospace;
              font-size: 7px;
              letter-spacing: 2px;
              text-transform: uppercase;
              background: 0 0;
              border: 1px solid var(--border);
              color: var(--ink3);
              padding: 5px 10px;
              cursor: pointer;
              transition: all .15s
            }

            .era-modal-edit button:hover {
              border-color: var(--ink);
              color: var(--ink)
            }

            /* Responsive: make the era modal narrower on small screens and stack content */

            @media (max-width: 520px) {
              .era-modal {
                width: min(92vw, 360px) !important;
                max-height: calc(100vh - 40px) !important;
                display: grid !important;
                grid-template-columns: 1fr !important;
                grid-auto-rows: min-content !important;
                padding: 0 !important;
                border-radius: 10px !important;
              }
              .era-modal-photo {
                min-height: 220px !important;
                border-bottom: 1px solid rgba(237, 232, 222, .06);
              }
              .era-modal-side {
                padding: 18px !important;
                border-left: none !important;
                max-height: calc(100vh - 260px) !important;
                overflow: auto !important;
              }
              .era-modal-name {
                font-size: 22px !important;
                padding-bottom: 8px !important;
                margin-bottom: 8px !important
              }
              .era-modal-tag {
                font-size: 9px !important;
                letter-spacing: 3px
              }
              .era-modal-close {
                top: 10px;
                right: 10px
              }
              .era-modal-desc {
                font-size: 13px;
                line-height: 1.5
              }
              .era-modal-links .era-modal-link {
                padding: 10px 12px
              }
            }

            .mp-stream-section {
              display: none
            }

            .mp-stream-links {
              display: none
            }

            @media(max-width:780px) {
              .mp-eras-grid {
                grid-template-columns: repeat(2, 1fr)
              }
              .era-modal {
                grid-template-columns: 1fr
              }
              .era-modal-photo {
                min-height: 220px
              }

              /* Mobile: compact streaming-service row — icon + label pill buttons */
              .mp-sidebar-streams {
                flex: none !important;
                height: auto !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                gap: 4px !important;
                padding: 6px 8px !important;
                align-items: flex-start !important;
              }

              .mp-sidebar-stream-link {
                flex: 0 0 auto !important;
                width: auto !important;
                min-width: 0 !important;
                max-width: none !important;
                height: auto !important;
                padding: 5px 8px !important;
                gap: 4px !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: flex-start !important;
                border-bottom: none !important;
                border-radius: 6px !important;
                box-sizing: border-box !important;
              }

              .mp-stream-icon-wrap {
                width: 14px !important;
                height: 14px !important;
                display: flex;
                align-items: center;
                justify-content: center
              }
              .mp-stream-icon-wrap svg {
                width: 14px !important;
                height: 14px !important
              }
              .mp-sidebar-stream-name {
                font-size: 8px !important;
                line-height: 1 !important;
                white-space: nowrap !important;
                text-align: left !important
              }

              /* very narrow screens */
              @media (max-width:400px) {
                .mp-sidebar-stream-link {
                  padding: 4px 6px !important;
                  gap: 3px !important
                }
                .mp-stream-icon-wrap {
                  width: 12px !important;
                  height: 12px !important
                }
                .mp-stream-icon-wrap svg {
                  width: 12px !important;
                  height: 12px !important
                }
                .mp-sidebar-stream-name {
                  font-size: 7px !important
                }
              }

              /* ensure rules apply in mobile preview mode as well */
          </style>
          <div class=mp style="display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 80px)">
            <aside class=mp-sidebar>
              <div class=mp-sidebar-identity>
                <div class=mp-av-ring><img src=https://i.imgur.com/Md1uu7A.png id=mp-sidebar-avatar loading=lazy decoding=async></div>
                <div class=mp-sidebar-name
                  id=mp-sidebar-name>FAME DOLL</div>
              </div>
              <div class=mp-sidebar-streams id=mp-sidebar-streams>
                <div class=mp-sidebar-stream-head>Stream</div>
              </div>
            </aside>
            <div>
              <div class=mp-eras-section>
                <div class=mp-eras-header>
                  <div class=mp-eras-headline>Discography</div><button onclick=addEra() class=mp-admin-add>+ Add</button></div>
                <div class=mp-eras-grid
                  id=mp-eras-list></div>
              </div>
            </div>
          </div>
        </div>
